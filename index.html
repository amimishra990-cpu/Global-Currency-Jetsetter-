<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jetsetter Currency Converter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <h1>Global Currency Jetsetter</h1>
      <p>Compare your money across multiple countries at once</p>
    </header>

    <main class="container">
      <section class="controls card">
        <div class="field">
          <label for="amount">Amount</label>
          <input type="number" id="amount" min="0" step="0.01" value="100" />
        </div>

        <div class="field">
          <label for="baseCurrency">Base Currency</label>
          <select id="baseCurrency"></select>
        </div>

        <div class="field">
          <label for="searchCurrency">Search Target Currencies</label>
          <input
            type="text"
            id="searchCurrency"
            placeholder="Search by code or name"
          />
        </div>

        <div class="field">
          <label for="sortBy">Sort Results</label>
          <select id="sortBy">
            <option value="code">Currency Code</option>
            <option value="value-desc">Converted Value: High to Low</option>
            <option value="value-asc">Converted Value: Low to High</option>
            <option value="alpha">Alphabetical Name</option>
          </select>
        </div>

        <div class="field full">
          <label>Target Currencies</label>
          <div id="currencyList" class="currency-list"></div>
        </div>

        <div class="actions">
          <button id="convertBtn">Convert</button>
          <button id="clearBtn" class="secondary">Clear</button>
        </div>
      </section>

      <section class="status-area">
        <div id="loading" class="loading hidden">Loading live exchange data...</div>
        <div id="error" class="error hidden"></div>
        <div id="lastUpdated" class="last-updated"></div>
      </section>

      <section id="results" class="results"></section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
